<svg width="900" height="30" viewBox="0 0 900 30" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00D2FF;stop-opacity:0"/>
      <stop offset="20%" style="stop-color:#00D2FF;stop-opacity:0.6"/>
      <stop offset="50%" style="stop-color:#7F52FF;stop-opacity:0.8"/>
      <stop offset="80%" style="stop-color:#FF6FD8;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#FF6FD8;stop-opacity:0"/>
    </linearGradient>
    <filter id="lineGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <line x1="100" y1="15" x2="800" y2="15" stroke="url(#lineGrad)" stroke-width="1" filter="url(#lineGlow)"/>
  <!-- Traveling dot -->
  <circle r="3" fill="#00D2FF" filter="url(#lineGlow)">
    <animate attributeName="cx" values="100;800;100" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="15;15;15" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="fill" values="#00D2FF;#7F52FF;#FF6FD8;#7F52FF;#00D2FF" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="r" values="3;4;3" dur="2s" repeatCount="indefinite"/>
  </circle>
  <!-- Center diamond -->
  <rect x="446" y="11" width="8" height="8" rx="1.5" fill="#FFC107" opacity="0.6" transform="rotate(45,450,15)">
    <animate attributeName="opacity" values="0.4;0.8;0.4" dur="3s" repeatCount="indefinite"/>
  </rect>
</svg>
