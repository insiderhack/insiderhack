<svg width="900" height="320" viewBox="0 0 900 320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D1117"/>
      <stop offset="30%" style="stop-color:#06101f"/>
      <stop offset="60%" style="stop-color:#0a0d2e"/>
      <stop offset="100%" style="stop-color:#150d35"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00D2FF"/>
      <stop offset="50%" style="stop-color:#7F52FF"/>
      <stop offset="100%" style="stop-color:#FF6FD8"/>
    </linearGradient>
    <linearGradient id="textGrad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FF6FD8"/>
      <stop offset="50%" style="stop-color:#FFC107"/>
      <stop offset="100%" style="stop-color:#00D2FF"/>
    </linearGradient>
    <linearGradient id="waveGrad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00D2FF;stop-opacity:0.5"/>
      <stop offset="50%" style="stop-color:#7F52FF;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#FF6FD8;stop-opacity:0.3"/>
    </linearGradient>
    <linearGradient id="waveGrad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7F52FF;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#00D2FF;stop-opacity:0.15"/>
    </linearGradient>
    <linearGradient id="waveGrad3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FF6FD8;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#FFC107;stop-opacity:0.1"/>
    </linearGradient>
    <linearGradient id="orbGrad1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#00D2FF;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#00D2FF;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="orbGrad2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#7F52FF;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#7F52FF;stop-opacity:0"/>
    </linearGradient>
    <radialGradient id="glowOrb1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#00D2FF;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#00D2FF;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="glowOrb2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#7F52FF;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#7F52FF;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="glowOrb3" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#FF6FD8;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#FF6FD8;stop-opacity:0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="bigGlow">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="320" fill="url(#bgGrad)"/>

  <!-- Animated nebula orbs -->
  <circle cx="120" cy="80" r="100" fill="url(#glowOrb1)">
    <animate attributeName="cx" values="120;180;120" dur="12s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="80;120;80" dur="10s" repeatCount="indefinite"/>
    <animate attributeName="r" values="100;130;100" dur="8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="750" cy="60" r="120" fill="url(#glowOrb2)">
    <animate attributeName="cx" values="750;700;750" dur="14s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="60;100;60" dur="11s" repeatCount="indefinite"/>
    <animate attributeName="r" values="120;90;120" dur="9s" repeatCount="indefinite"/>
  </circle>
  <circle cx="450" cy="200" r="90" fill="url(#glowOrb3)">
    <animate attributeName="cx" values="450;500;450" dur="13s" repeatCount="indefinite"/>
    <animate attributeName="r" values="90;120;90" dur="7s" repeatCount="indefinite"/>
  </circle>

  <!-- Grid lines (subtle) -->
  <g opacity="0.04" stroke="#00D2FF" stroke-width="0.5">
    <line x1="0" y1="50" x2="900" y2="50"/><line x1="0" y1="100" x2="900" y2="100"/>
    <line x1="0" y1="150" x2="900" y2="150"/><line x1="0" y1="200" x2="900" y2="200"/>
    <line x1="0" y1="250" x2="900" y2="250"/>
    <line x1="100" y1="0" x2="100" y2="320"/><line x1="200" y1="0" x2="200" y2="320"/>
    <line x1="300" y1="0" x2="300" y2="320"/><line x1="400" y1="0" x2="400" y2="320"/>
    <line x1="500" y1="0" x2="500" y2="320"/><line x1="600" y1="0" x2="600" y2="320"/>
    <line x1="700" y1="0" x2="700" y2="320"/><line x1="800" y1="0" x2="800" y2="320"/>
  </g>

  <!-- Animated triple wave bottom -->
  <path fill="url(#waveGrad3)" opacity="0.4">
    <animate attributeName="d" dur="10s" repeatCount="indefinite" values="
      M0,260 C100,240 200,280 300,260 C400,240 500,275 600,258 C700,240 800,270 900,255 L900,320 L0,320 Z;
      M0,255 C100,270 200,245 300,265 C400,280 500,250 600,262 C700,275 800,248 900,260 L900,320 L0,320 Z;
      M0,260 C100,240 200,280 300,260 C400,240 500,275 600,258 C700,240 800,270 900,255 L900,320 L0,320 Z"/>
  </path>
  <path fill="url(#waveGrad2)" opacity="0.5">
    <animate attributeName="d" dur="8s" repeatCount="indefinite" values="
      M0,270 C150,250 300,290 450,270 C600,250 750,280 900,265 L900,320 L0,320 Z;
      M0,265 C150,280 300,255 450,275 C600,295 750,260 900,270 L900,320 L0,320 Z;
      M0,270 C150,250 300,290 450,270 C600,250 750,280 900,265 L900,320 L0,320 Z"/>
  </path>
  <path fill="url(#waveGrad1)" opacity="0.6">
    <animate attributeName="d" dur="6s" repeatCount="indefinite" values="
      M0,285 C200,265 400,305 600,280 C750,262 850,288 900,278 L900,320 L0,320 Z;
      M0,278 C200,295 400,270 600,292 C750,308 850,275 900,285 L900,320 L0,320 Z;
      M0,285 C200,265 400,305 600,280 C750,262 850,288 900,278 L900,320 L0,320 Z"/>
  </path>

  <!-- Floating star particles with pulse -->
  <circle cx="60" cy="40" r="1.8" fill="#00D2FF" opacity="0">
    <animate attributeName="opacity" values="0;1;0" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="40;35;40" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="140" cy="25" r="1" fill="#FF6FD8" opacity="0">
    <animate attributeName="opacity" values="0;0.8;0" dur="4s" repeatCount="indefinite" begin="0.5s"/>
    <animate attributeName="cy" values="25;20;25" dur="4s" repeatCount="indefinite" begin="0.5s"/>
  </circle>
  <circle cx="250" cy="50" r="1.3" fill="#7F52FF" opacity="0">
    <animate attributeName="opacity" values="0;0.9;0" dur="3.5s" repeatCount="indefinite" begin="1s"/>
    <animate attributeName="cy" values="50;44;50" dur="3.5s" repeatCount="indefinite" begin="1s"/>
  </circle>
  <circle cx="380" cy="20" r="0.8" fill="#FFC107" opacity="0">
    <animate attributeName="opacity" values="0;1;0" dur="2.8s" repeatCount="indefinite" begin="0.3s"/>
  </circle>
  <circle cx="520" cy="35" r="1.5" fill="#00D2FF" opacity="0">
    <animate attributeName="opacity" values="0;0.7;0" dur="4.2s" repeatCount="indefinite" begin="1.5s"/>
    <animate attributeName="cy" values="35;28;35" dur="4.2s" repeatCount="indefinite" begin="1.5s"/>
  </circle>
  <circle cx="650" cy="45" r="1.2" fill="#FF6FD8" opacity="0">
    <animate attributeName="opacity" values="0;0.9;0" dur="3.2s" repeatCount="indefinite" begin="0.8s"/>
  </circle>
  <circle cx="770" cy="30" r="1.6" fill="#7F52FF" opacity="0">
    <animate attributeName="opacity" values="0;1;0" dur="3.8s" repeatCount="indefinite" begin="2s"/>
    <animate attributeName="cy" values="30;24;30" dur="3.8s" repeatCount="indefinite" begin="2s"/>
  </circle>
  <circle cx="850" cy="55" r="1" fill="#FFC107" opacity="0">
    <animate attributeName="opacity" values="0;0.8;0" dur="2.5s" repeatCount="indefinite" begin="1.2s"/>
  </circle>
  <circle cx="410" cy="60" r="1.4" fill="#00D2FF" opacity="0">
    <animate attributeName="opacity" values="0;0.6;0" dur="5s" repeatCount="indefinite" begin="0.7s"/>
    <animate attributeName="cy" values="60;53;60" dur="5s" repeatCount="indefinite" begin="0.7s"/>
  </circle>
  <circle cx="580" cy="15" r="0.9" fill="#FF6FD8" opacity="0">
    <animate attributeName="opacity" values="0;1;0" dur="3s" repeatCount="indefinite" begin="1.8s"/>
  </circle>

  <!-- Shooting star -->
  <line x1="0" y1="0" x2="30" y2="20" stroke="#00D2FF" stroke-width="1.5" stroke-linecap="round" opacity="0">
    <animate attributeName="opacity" values="0;0;0.8;0" dur="6s" repeatCount="indefinite" keyTimes="0;0.4;0.5;0.6"/>
    <animate attributeName="x1" values="100;300" dur="6s" repeatCount="indefinite"/>
    <animate attributeName="y1" values="10;60" dur="6s" repeatCount="indefinite"/>
    <animate attributeName="x2" values="130;330" dur="6s" repeatCount="indefinite"/>
    <animate attributeName="y2" values="30;80" dur="6s" repeatCount="indefinite"/>
  </line>
  <line x1="0" y1="0" x2="25" y2="15" stroke="#FF6FD8" stroke-width="1" stroke-linecap="round" opacity="0">
    <animate attributeName="opacity" values="0;0;0.6;0" dur="9s" repeatCount="indefinite" keyTimes="0;0.5;0.6;0.7"/>
    <animate attributeName="x1" values="600;800" dur="9s" repeatCount="indefinite"/>
    <animate attributeName="y1" values="5;55" dur="9s" repeatCount="indefinite"/>
    <animate attributeName="x2" values="625;825" dur="9s" repeatCount="indefinite"/>
    <animate attributeName="y2" values="20;70" dur="9s" repeatCount="indefinite"/>
  </line>

  <!-- Greeting line -->
  <text x="450" y="72" font-family="'Courier New', monospace" font-size="15" font-weight="400"
    text-anchor="middle" fill="#8892b0" letter-spacing="4" opacity="0">
    &lt; Hello World, I'm /&gt;
    <animate attributeName="opacity" from="0" to="1" dur="1s" fill="freeze" begin="0.3s"/>
  </text>

  <!-- Name - animated reveal -->
  <text x="450" y="120" font-family="'Segoe UI', Arial, sans-serif" font-size="42" font-weight="800"
    text-anchor="middle" fill="url(#textGrad)" filter="url(#glow)" letter-spacing="-1" opacity="0">
    Muhammad Rizki
    <animate attributeName="opacity" from="0" to="1" dur="1.2s" fill="freeze" begin="0.6s"/>
  </text>

  <!-- Full name subtitle -->
  <text x="450" y="148" font-family="'Courier New', monospace" font-size="13" font-weight="400"
    text-anchor="middle" fill="#6B7A99" letter-spacing="2" opacity="0">
    Muhammad Rizki Perdana Putra
    <animate attributeName="opacity" from="0" to="0.7" dur="1s" fill="freeze" begin="1s"/>
  </text>

  <!-- Animated decorative line pair -->
  <line x1="200" y1="162" x2="370" y2="162" stroke="url(#textGrad)" stroke-width="1" opacity="0">
    <animate attributeName="opacity" from="0" to="0.5" dur="0.8s" fill="freeze" begin="1.4s"/>
    <animate attributeName="x1" values="200;180;200" dur="5s" repeatCount="indefinite"/>
  </line>
  <line x1="530" y1="162" x2="700" y2="162" stroke="url(#textGrad2)" stroke-width="1" opacity="0">
    <animate attributeName="opacity" from="0" to="0.5" dur="0.8s" fill="freeze" begin="1.4s"/>
    <animate attributeName="x2" values="700;720;700" dur="5s" repeatCount="indefinite"/>
  </line>

  <!-- Diamond separator -->
  <rect x="445" y="157" width="10" height="10" rx="2" fill="#FFC107" opacity="0" transform="rotate(45,450,162)">
    <animate attributeName="opacity" from="0" to="0.6" dur="0.8s" fill="freeze" begin="1.4s"/>
    <animate attributeName="fill" values="#FFC107;#00D2FF;#FF6FD8;#FFC107" dur="6s" repeatCount="indefinite"/>
  </rect>

  <!-- Role text -->
  <text x="450" y="190" font-family="'Courier New', monospace" font-size="14" font-weight="400"
    text-anchor="middle" fill="#BDC3C7" letter-spacing="1" opacity="0">
    Technical Consulting Manager  &#x2022;  Data &amp; AI Architect
    <animate attributeName="opacity" from="0" to="1" dur="1s" fill="freeze" begin="1.6s"/>
  </text>

  <!-- Animated tag badges -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.8s" fill="freeze" begin="2s"/>

    <rect x="218" y="206" width="100" height="24" rx="12" fill="#00D2FF" opacity="0.1" stroke="#00D2FF" stroke-width="0.8" stroke-opacity="0.5">
      <animate attributeName="stroke-opacity" values="0.5;1;0.5" dur="3s" repeatCount="indefinite"/>
    </rect>
    <text x="268" y="222" font-family="'Courier New', monospace" font-size="10" text-anchor="middle" fill="#00D2FF">&#x1F433; Self-Hosting</text>

    <rect x="328" y="206" width="85" height="24" rx="12" fill="#7F52FF" opacity="0.1" stroke="#7F52FF" stroke-width="0.8" stroke-opacity="0.5">
      <animate attributeName="stroke-opacity" values="0.5;1;0.5" dur="3s" repeatCount="indefinite" begin="0.5s"/>
    </rect>
    <text x="370" y="222" font-family="'Courier New', monospace" font-size="10" text-anchor="middle" fill="#7F52FF">&#x1F916; Data &amp; AI</text>

    <rect x="423" y="206" width="95" height="24" rx="12" fill="#FF6FD8" opacity="0.1" stroke="#FF6FD8" stroke-width="0.8" stroke-opacity="0.5">
      <animate attributeName="stroke-opacity" values="0.5;1;0.5" dur="3s" repeatCount="indefinite" begin="1s"/>
    </rect>
    <text x="470" y="222" font-family="'Courier New', monospace" font-size="10" text-anchor="middle" fill="#FF6FD8">&#x1F310; Open Source</text>

    <rect x="528" y="206" width="75" height="24" rx="12" fill="#FFC107" opacity="0.1" stroke="#FFC107" stroke-width="0.8" stroke-opacity="0.5">
      <animate attributeName="stroke-opacity" values="0.5;1;0.5" dur="3s" repeatCount="indefinite" begin="1.5s"/>
    </rect>
    <text x="565" y="222" font-family="'Courier New', monospace" font-size="10" text-anchor="middle" fill="#FFC107">&#x2601; DevOps</text>

    <rect x="613" y="206" width="75" height="24" rx="12" fill="#00D2FF" opacity="0.1" stroke="#00D2FF" stroke-width="0.8" stroke-opacity="0.5">
      <animate attributeName="stroke-opacity" values="0.5;1;0.5" dur="3s" repeatCount="indefinite" begin="2s"/>
    </rect>
    <text x="650" y="222" font-family="'Courier New', monospace" font-size="10" text-anchor="middle" fill="#00D2FF">&#x1F3E0; Homelab</text>
  </g>

  <!-- Cursor blink -->
  <rect x="740" y="108" width="3" height="22" rx="1" fill="#00D2FF" opacity="0">
    <animate attributeName="opacity" values="0;1;0" dur="1s" repeatCount="indefinite" begin="1.8s"/>
  </rect>
</svg>
