<svg width="900" height="220" viewBox="0 0 900 220" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D1117"/>
      <stop offset="50%" style="stop-color:#0a1628"/>
      <stop offset="100%" style="stop-color:#130d2a"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#39A7FF"/>
      <stop offset="100%" style="stop-color:#7F52FF"/>
    </linearGradient>
    <linearGradient id="waveGrad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#39A7FF;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#7F52FF;stop-opacity:0.3"/>
    </linearGradient>
    <linearGradient id="waveGrad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7F52FF;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#39A7FF;stop-opacity:0.2"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="220" fill="url(#bgGrad)"/>

  <!-- Animated wave bottom -->
  <path fill="url(#waveGrad2)" opacity="0.5">
    <animate attributeName="d" dur="8s" repeatCount="indefinite"
      values="
        M0,160 C150,140 300,180 450,160 C600,140 750,170 900,155 L900,220 L0,220 Z;
        M0,155 C150,170 300,145 450,165 C600,185 750,150 900,160 L900,220 L0,220 Z;
        M0,160 C150,140 300,180 450,160 C600,140 750,170 900,155 L900,220 L0,220 Z
      "/>
  </path>
  <path fill="url(#waveGrad1)" opacity="0.7">
    <animate attributeName="d" dur="6s" repeatCount="indefinite"
      values="
        M0,175 C200,155 400,195 600,170 C750,152 850,178 900,168 L900,220 L0,220 Z;
        M0,168 C200,185 400,160 600,182 C750,198 850,165 900,175 L900,220 L0,220 Z;
        M0,175 C200,155 400,195 600,170 C750,152 850,178 900,168 L900,220 L0,220 Z
      "/>
  </path>

  <!-- Dot particles -->
  <circle cx="80" cy="50" r="1.5" fill="#39A7FF" opacity="0.5">
    <animate attributeName="opacity" values="0.5;1;0.5" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="200" cy="30" r="1" fill="#7F52FF" opacity="0.4">
    <animate attributeName="opacity" values="0.4;0.9;0.4" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="750" cy="40" r="1.5" fill="#39A7FF" opacity="0.5">
    <animate attributeName="opacity" values="0.5;1;0.5" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="820" cy="70" r="1" fill="#FFC107" opacity="0.4">
    <animate attributeName="opacity" values="0.4;0.8;0.4" dur="3.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="450" cy="25" r="1.2" fill="#7F52FF" opacity="0.3">
    <animate attributeName="opacity" values="0.3;0.7;0.3" dur="5s" repeatCount="indefinite"/>
  </circle>

  <!-- Name text -->
  <text x="450" y="95" font-family="'Segoe UI', Arial, sans-serif" font-size="38" font-weight="700"
    text-anchor="middle" fill="url(#textGrad)" filter="url(#glow)" letter-spacing="-1">
    Rizki Perdana Putra
  </text>

  <!-- Role text -->
  <text x="450" y="130" font-family="'Courier New', monospace" font-size="14" font-weight="400"
    text-anchor="middle" fill="#BDC3C7" letter-spacing="1">
    Technical Consulting Manager  |  Data &amp; AI Enthusiast
  </text>

  <!-- Animated underline -->
  <line x1="280" y1="140" x2="620" y2="140" stroke="url(#textGrad)" stroke-width="1" opacity="0.6">
    <animate attributeName="x1" values="280;240;280" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="x2" values="620;660;620" dur="4s" repeatCount="indefinite"/>
  </line>

  <!-- Tag badges -->
  <rect x="318" y="152" width="86" height="22" rx="11" fill="#39A7FF" opacity="0.15" stroke="#39A7FF" stroke-width="0.8" stroke-opacity="0.5"/>
  <text x="361" y="167" font-family="'Courier New', monospace" font-size="10" text-anchor="middle" fill="#39A7FF">Self-Hosting</text>

  <rect x="414" y="152" width="72" height="22" rx="11" fill="#7F52FF" opacity="0.15" stroke="#7F52FF" stroke-width="0.8" stroke-opacity="0.5"/>
  <text x="450" y="167" font-family="'Courier New', monospace" font-size="10" text-anchor="middle" fill="#7F52FF">Data &amp; AI</text>

  <rect x="496" y="152" width="86" height="22" rx="11" fill="#FFC107" opacity="0.12" stroke="#FFC107" stroke-width="0.8" stroke-opacity="0.5"/>
  <text x="539" y="167" font-family="'Courier New', monospace" font-size="10" text-anchor="middle" fill="#FFC107">Open Source</text>
</svg>
