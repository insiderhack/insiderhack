<svg width="900" height="160" viewBox="0 0 900 160" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D1117"/>
      <stop offset="100%" style="stop-color:#111827"/>
    </linearGradient>
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00D2FF"/>
      <stop offset="50%" style="stop-color:#7F52FF"/>
      <stop offset="100%" style="stop-color:#FF6FD8"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700"/>
      <stop offset="100%" style="stop-color:#FFA500"/>
    </linearGradient>
    <linearGradient id="silver" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#C0C0C0"/>
      <stop offset="100%" style="stop-color:#808080"/>
    </linearGradient>
    <linearGradient id="blue" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00D2FF"/>
      <stop offset="100%" style="stop-color:#7F52FF"/>
    </linearGradient>
    <filter id="trophyGlow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="900" height="160" rx="12" fill="url(#bg)" stroke="url(#borderGrad)" stroke-width="0.8" stroke-opacity="0.25">
    <animate attributeName="stroke-opacity" values="0.15;0.4;0.15" dur="5s" repeatCount="indefinite"/>
  </rect>

  <!-- Trophy 1: MultiLanguage -->
  <g transform="translate(20,15)" opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" fill="freeze" begin="0.2s"/>
    <rect width="130" height="130" rx="10" fill="#0D1117" stroke="#FFD700" stroke-width="0.8" stroke-opacity="0.4">
      <animate attributeName="stroke-opacity" values="0.3;0.8;0.3" dur="3s" repeatCount="indefinite"/>
    </rect>
    <text x="65" y="45" font-size="28" text-anchor="middle" font-family="Arial">🏅</text>
    <text x="65" y="68" font-family="'Courier New', monospace" font-size="9" font-weight="700" fill="#FFD700" text-anchor="middle" filter="url(#trophyGlow)">MultiLanguage</text>
    <text x="65" y="84" font-family="Arial" font-size="9" fill="#6B7A99" text-anchor="middle">3 Languages</text>
    <rect x="20" y="100" width="90" height="18" rx="9" fill="#FFD700" fill-opacity="0.12" stroke="#FFD700" stroke-width="0.6" stroke-opacity="0.6"/>
    <text x="65" y="113" font-family="'Courier New', monospace" font-size="9" fill="#FFD700" text-anchor="middle">★ GOLD</text>
  </g>

  <!-- Trophy 2: Commits -->
  <g transform="translate(165,15)" opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" fill="freeze" begin="0.4s"/>
    <rect width="130" height="130" rx="10" fill="#0D1117" stroke="#C0C0C0" stroke-width="0.8" stroke-opacity="0.4">
      <animate attributeName="stroke-opacity" values="0.3;0.7;0.3" dur="3.5s" repeatCount="indefinite"/>
    </rect>
    <text x="65" y="45" font-size="28" text-anchor="middle" font-family="Arial">🔨</text>
    <text x="65" y="68" font-family="'Courier New', monospace" font-size="9" font-weight="700" fill="#C0C0C0" text-anchor="middle">Commits</text>
    <text x="65" y="84" font-family="Arial" font-size="9" fill="#6B7A99" text-anchor="middle">127 Commits</text>
    <rect x="20" y="100" width="90" height="18" rx="9" fill="#C0C0C0" fill-opacity="0.12" stroke="#C0C0C0" stroke-width="0.6" stroke-opacity="0.6"/>
    <text x="65" y="113" font-family="'Courier New', monospace" font-size="9" fill="#C0C0C0" text-anchor="middle">✦ SILVER</text>
  </g>

  <!-- Trophy 3: Repositories -->
  <g transform="translate(310,15)" opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" fill="freeze" begin="0.6s"/>
    <rect width="130" height="130" rx="10" fill="#0D1117" stroke="#00D2FF" stroke-width="0.8" stroke-opacity="0.4">
      <animate attributeName="stroke-opacity" values="0.3;0.8;0.3" dur="2.5s" repeatCount="indefinite"/>
    </rect>
    <text x="65" y="45" font-size="28" text-anchor="middle" font-family="Arial">📋</text>
    <text x="65" y="68" font-family="'Courier New', monospace" font-size="9" font-weight="700" fill="#00D2FF" text-anchor="middle">Repositories</text>
    <text x="65" y="84" font-family="Arial" font-size="9" fill="#6B7A99" text-anchor="middle">10+ Repos</text>
    <rect x="20" y="100" width="90" height="18" rx="9" fill="#00D2FF" fill-opacity="0.12" stroke="#00D2FF" stroke-width="0.6" stroke-opacity="0.6"/>
    <text x="65" y="113" font-family="'Courier New', monospace" font-size="9" fill="#00D2FF" text-anchor="middle">◆ BLUE</text>
  </g>

  <!-- Trophy 4: Followers -->
  <g transform="translate(455,15)" opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" fill="freeze" begin="0.8s"/>
    <rect width="130" height="130" rx="10" fill="#0D1117" stroke="#7F52FF" stroke-width="0.8" stroke-opacity="0.4">
      <animate attributeName="stroke-opacity" values="0.3;0.7;0.3" dur="3s" repeatCount="indefinite"/>
    </rect>
    <text x="65" y="45" font-size="28" text-anchor="middle" font-family="Arial">🤝</text>
    <text x="65" y="68" font-family="'Courier New', monospace" font-size="9" font-weight="700" fill="#7F52FF" text-anchor="middle">Followers</text>
    <text x="65" y="84" font-family="Arial" font-size="9" fill="#6B7A99" text-anchor="middle">5+ Followers</text>
    <rect x="20" y="100" width="90" height="18" rx="9" fill="#7F52FF" fill-opacity="0.12" stroke="#7F52FF" stroke-width="0.6" stroke-opacity="0.6"/>
    <text x="65" y="113" font-family="'Courier New', monospace" font-size="9" fill="#7F52FF" text-anchor="middle">◆ PURPLE</text>
  </g>

  <!-- Trophy 5: Stars -->
  <g transform="translate(600,15)" opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" fill="freeze" begin="1s"/>
    <rect width="130" height="130" rx="10" fill="#0D1117" stroke="#6B7A99" stroke-width="0.8" stroke-opacity="0.4"/>
    <text x="65" y="45" font-size="28" text-anchor="middle" font-family="Arial">⭐</text>
    <text x="65" y="68" font-family="'Courier New', monospace" font-size="9" font-weight="700" fill="#6B7A99" text-anchor="middle">Stars</text>
    <text x="65" y="84" font-family="Arial" font-size="9" fill="#6B7A99" text-anchor="middle">0 Stars</text>
    <rect x="20" y="100" width="90" height="18" rx="9" fill="#6B7A99" fill-opacity="0.1" stroke="#6B7A99" stroke-width="0.6" stroke-opacity="0.4"/>
    <text x="65" y="113" font-family="'Courier New', monospace" font-size="9" fill="#6B7A99" text-anchor="middle">○ BRONZE</text>
  </g>

  <!-- Trophy 6: LongTimeUser -->
  <g transform="translate(745,15)" opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" fill="freeze" begin="1.2s"/>
    <rect width="130" height="130" rx="10" fill="#0D1117" stroke="#FFD700" stroke-width="0.8" stroke-opacity="0.4">
      <animate attributeName="stroke-opacity" values="0.3;0.8;0.3" dur="2.8s" repeatCount="indefinite"/>
    </rect>
    <text x="65" y="45" font-size="28" text-anchor="middle" font-family="Arial">⏳</text>
    <text x="65" y="68" font-family="'Courier New', monospace" font-size="9" font-weight="700" fill="#FFD700" text-anchor="middle" filter="url(#trophyGlow)">LongTimeUser</text>
    <text x="65" y="84" font-family="Arial" font-size="9" fill="#6B7A99" text-anchor="middle">Since 2018</text>
    <rect x="20" y="100" width="90" height="18" rx="9" fill="#FFD700" fill-opacity="0.12" stroke="#FFD700" stroke-width="0.6" stroke-opacity="0.6"/>
    <text x="65" y="113" font-family="'Courier New', monospace" font-size="9" fill="#FFD700" text-anchor="middle">★ GOLD</text>
  </g>
</svg>
