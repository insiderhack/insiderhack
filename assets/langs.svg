<svg width="340" height="230" viewBox="0 0 340 230" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="cardBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D1117"/>
      <stop offset="100%" style="stop-color:#111827"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00D2FF"/>
      <stop offset="50%" style="stop-color:#7F52FF"/>
      <stop offset="100%" style="stop-color:#FF6FD8"/>
    </linearGradient>
  </defs>

  <rect width="340" height="230" rx="12" fill="url(#cardBg)" stroke="url(#titleGrad)" stroke-width="0.8" stroke-opacity="0.3">
    <animate attributeName="stroke-opacity" values="0.2;0.5;0.2" dur="4s" repeatCount="indefinite"/>
  </rect>
  <text x="22" y="32" font-family="'Segoe UI', Arial, sans-serif" font-size="14" font-weight="700" fill="url(#titleGrad)">Most Used Languages</text>
  <line x1="22" y1="42" x2="318" y2="42" stroke="url(#titleGrad)" stroke-width="0.5" stroke-opacity="0.3"/>

  <!-- TypeScript 30% -->
  <g opacity="0"><animate attributeName="opacity" from="0" to="1" dur="0.4s" fill="freeze" begin="0.2s"/>
    <text x="22" y="66" font-family="Arial" font-size="12" fill="#BDC3C7">TypeScript</text>
    <text x="318" y="66" font-family="'Courier New', monospace" font-size="11" fill="#3178C6" text-anchor="end">30.0%</text>
    <rect x="22" y="72" width="296" height="7" rx="3.5" fill="#1a2030"/>
    <rect x="22" y="72" width="0" height="7" rx="3.5" fill="#3178C6">
      <animate attributeName="width" from="0" to="89" dur="1.2s" fill="freeze" begin="0.3s" calcMode="spline" keySplines="0.16 1 0.3 1"/>
    </rect>
  </g>

  <!-- Go 20% -->
  <g opacity="0"><animate attributeName="opacity" from="0" to="1" dur="0.4s" fill="freeze" begin="0.5s"/>
    <text x="22" y="98" font-family="Arial" font-size="12" fill="#BDC3C7">Go</text>
    <text x="318" y="98" font-family="'Courier New', monospace" font-size="11" fill="#00ADD8" text-anchor="end">20.0%</text>
    <rect x="22" y="104" width="296" height="7" rx="3.5" fill="#1a2030"/>
    <rect x="22" y="104" width="0" height="7" rx="3.5" fill="#00ADD8">
      <animate attributeName="width" from="0" to="59" dur="1.4s" fill="freeze" begin="0.6s" calcMode="spline" keySplines="0.16 1 0.3 1"/>
    </rect>
  </g>

  <!-- Python 17% -->
  <g opacity="0"><animate attributeName="opacity" from="0" to="1" dur="0.4s" fill="freeze" begin="0.8s"/>
    <text x="22" y="130" font-family="Arial" font-size="12" fill="#BDC3C7">Python</text>
    <text x="318" y="130" font-family="'Courier New', monospace" font-size="11" fill="#3776AB" text-anchor="end">17.0%</text>
    <rect x="22" y="136" width="296" height="7" rx="3.5" fill="#1a2030"/>
    <rect x="22" y="136" width="0" height="7" rx="3.5" fill="#3776AB">
      <animate attributeName="width" from="0" to="50" dur="1.6s" fill="freeze" begin="0.9s" calcMode="spline" keySplines="0.16 1 0.3 1"/>
    </rect>
  </g>

  <!-- Java 15% -->
  <g opacity="0"><animate attributeName="opacity" from="0" to="1" dur="0.4s" fill="freeze" begin="1.1s"/>
    <text x="22" y="162" font-family="Arial" font-size="12" fill="#BDC3C7">Java</text>
    <text x="318" y="162" font-family="'Courier New', monospace" font-size="11" fill="#ED8B00" text-anchor="end">15.0%</text>
    <rect x="22" y="168" width="296" height="7" rx="3.5" fill="#1a2030"/>
    <rect x="22" y="168" width="0" height="7" rx="3.5" fill="#ED8B00">
      <animate attributeName="width" from="0" to="44" dur="1.8s" fill="freeze" begin="1.2s" calcMode="spline" keySplines="0.16 1 0.3 1"/>
    </rect>
  </g>

  <!-- SQL 10% -->
  <g opacity="0"><animate attributeName="opacity" from="0" to="1" dur="0.4s" fill="freeze" begin="1.4s"/>
    <text x="22" y="194" font-family="Arial" font-size="12" fill="#BDC3C7">SQL</text>
    <text x="318" y="194" font-family="'Courier New', monospace" font-size="11" fill="#00D2FF" text-anchor="end">10.0%</text>
    <rect x="22" y="200" width="296" height="7" rx="3.5" fill="#1a2030"/>
    <rect x="22" y="200" width="0" height="7" rx="3.5" fill="#00D2FF">
      <animate attributeName="width" from="0" to="30" dur="2s" fill="freeze" begin="1.5s" calcMode="spline" keySplines="0.16 1 0.3 1"/>
    </rect>
  </g>

  <!-- Other 8% -->
  <g opacity="0"><animate attributeName="opacity" from="0" to="1" dur="0.4s" fill="freeze" begin="1.7s"/>
    <text x="22" y="222" font-family="Arial" font-size="11" fill="#6B7A99">Spark/Scala, YAML, HCL ...</text>
    <text x="318" y="222" font-family="'Courier New', monospace" font-size="11" fill="#6B7A99" text-anchor="end">8.0%</text>
  </g>
</svg>
