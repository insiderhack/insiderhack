<svg width="340" height="195" viewBox="0 0 340 195" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="cardBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D1117"/>
      <stop offset="100%" style="stop-color:#111827"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#39A7FF"/>
      <stop offset="100%" style="stop-color:#7F52FF"/>
    </linearGradient>
  </defs>

  <rect width="340" height="195" rx="12" fill="url(#cardBg)" stroke="#39A7FF" stroke-width="0.5" stroke-opacity="0.25"/>
  <text x="22" y="32" font-family="'Segoe UI', Arial, sans-serif" font-size="14" font-weight="700" fill="url(#titleGrad)">Most Used Languages</text>
  <line x1="22" y1="42" x2="318" y2="42" stroke="#39A7FF" stroke-width="0.5" stroke-opacity="0.2"/>

  <!-- Language bars -->
  <!-- Kotlin 42% -->
  <text x="22" y="68" font-family="Arial" font-size="12" fill="#BDC3C7">Kotlin</text>
  <text x="318" y="68" font-family="'Courier New', monospace" font-size="11" fill="#7F52FF" text-anchor="end">42.0%</text>
  <rect x="22" y="74" width="296" height="7" rx="3.5" fill="#1a2030"/>
  <rect x="22" y="74" width="0" height="7" rx="3.5" fill="#7F52FF">
    <animate attributeName="width" from="0" to="124" dur="1.2s" fill="freeze" calcMode="spline" keySplines="0.16 1 0.3 1"/>
  </rect>

  <!-- Java 28% -->
  <text x="22" y="103" font-family="Arial" font-size="12" fill="#BDC3C7">Java</text>
  <text x="318" y="103" font-family="'Courier New', monospace" font-size="11" fill="#ED8B00" text-anchor="end">28.0%</text>
  <rect x="22" y="109" width="296" height="7" rx="3.5" fill="#1a2030"/>
  <rect x="22" y="109" width="0" height="7" rx="3.5" fill="#ED8B00">
    <animate attributeName="width" from="0" to="83" dur="1.4s" fill="freeze" calcMode="spline" keySplines="0.16 1 0.3 1"/>
  </rect>

  <!-- Python 18% -->
  <text x="22" y="138" font-family="Arial" font-size="12" fill="#BDC3C7">Python</text>
  <text x="318" y="138" font-family="'Courier New', monospace" font-size="11" fill="#3776AB" text-anchor="end">18.0%</text>
  <rect x="22" y="144" width="296" height="7" rx="3.5" fill="#1a2030"/>
  <rect x="22" y="144" width="0" height="7" rx="3.5" fill="#3776AB">
    <animate attributeName="width" from="0" to="53" dur="1.6s" fill="freeze" calcMode="spline" keySplines="0.16 1 0.3 1"/>
  </rect>

  <!-- C# 8% -->
  <text x="22" y="173" font-family="Arial" font-size="12" fill="#BDC3C7">C#</text>
  <text x="318" y="173" font-family="'Courier New', monospace" font-size="11" fill="#239120" text-anchor="end">8.0%</text>
  <rect x="22" y="179" width="296" height="7" rx="3.5" fill="#1a2030"/>
  <rect x="22" y="179" width="0" height="7" rx="3.5" fill="#239120">
    <animate attributeName="width" from="0" to="24" dur="1.8s" fill="freeze" calcMode="spline" keySplines="0.16 1 0.3 1"/>
  </rect>
</svg>
