<svg width="440" height="195" viewBox="0 0 440 195" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="cardBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D1117"/>
      <stop offset="100%" style="stop-color:#111827"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00D2FF"/>
      <stop offset="50%" style="stop-color:#7F52FF"/>
      <stop offset="100%" style="stop-color:#FF6FD8"/>
    </linearGradient>
    <linearGradient id="barGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00D2FF"/>
      <stop offset="50%" style="stop-color:#7F52FF"/>
      <stop offset="100%" style="stop-color:#FF6FD8"/>
    </linearGradient>
    <filter id="cardGlow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Card bg with animated border -->
  <rect width="440" height="195" rx="12" fill="url(#cardBg)" stroke="url(#titleGrad)" stroke-width="0.8" stroke-opacity="0.3">
    <animate attributeName="stroke-opacity" values="0.2;0.5;0.2" dur="4s" repeatCount="indefinite"/>
  </rect>

  <!-- Title -->
  <text x="22" y="32" font-family="'Segoe UI', Arial, sans-serif" font-size="14" font-weight="700" fill="url(#titleGrad)">Muhammad Rizki's GitHub Stats</text>

  <!-- Divider -->
  <line x1="22" y1="42" x2="418" y2="42" stroke="url(#titleGrad)" stroke-width="0.5" stroke-opacity="0.3"/>

  <!-- Stats rows with fade-in -->
  <g opacity="0"><animate attributeName="opacity" from="0" to="1" dur="0.5s" fill="freeze" begin="0.2s"/>
    <text x="22" y="68" font-family="Arial" font-size="13" fill="#BDC3C7">⭐  Total Stars Earned:</text>
    <text x="340" y="68" font-family="'Courier New', monospace" font-size="13" font-weight="700" fill="#00D2FF" text-anchor="end">0</text>
  </g>

  <g opacity="0"><animate attributeName="opacity" from="0" to="1" dur="0.5s" fill="freeze" begin="0.4s"/>
    <text x="22" y="92" font-family="Arial" font-size="13" fill="#BDC3C7">🔨  Total Commits (2025):</text>
    <text x="340" y="92" font-family="'Courier New', monospace" font-size="13" font-weight="700" fill="#00D2FF" text-anchor="end">127</text>
  </g>

  <g opacity="0"><animate attributeName="opacity" from="0" to="1" dur="0.5s" fill="freeze" begin="0.6s"/>
    <text x="22" y="116" font-family="Arial" font-size="13" fill="#BDC3C7">🔀  Total PRs:</text>
    <text x="340" y="116" font-family="'Courier New', monospace" font-size="13" font-weight="700" fill="#7F52FF" text-anchor="end">2</text>
  </g>

  <g opacity="0"><animate attributeName="opacity" from="0" to="1" dur="0.5s" fill="freeze" begin="0.8s"/>
    <text x="22" y="140" font-family="Arial" font-size="13" fill="#BDC3C7">🐛  Total Issues:</text>
    <text x="340" y="140" font-family="'Courier New', monospace" font-size="13" font-weight="700" fill="#7F52FF" text-anchor="end">0</text>
  </g>

  <g opacity="0"><animate attributeName="opacity" from="0" to="1" dur="0.5s" fill="freeze" begin="1s"/>
    <text x="22" y="164" font-family="Arial" font-size="13" fill="#BDC3C7">📦  Contributed to (last year):</text>
    <text x="340" y="164" font-family="'Courier New', monospace" font-size="13" font-weight="700" fill="#FFC107" text-anchor="end">5</text>
  </g>

  <!-- Progress bar bg -->
  <rect x="22" y="176" width="396" height="6" rx="3" fill="#1a2030"/>
  <!-- Progress bar fill animated -->
  <rect x="22" y="176" width="0" height="6" rx="3" fill="url(#barGrad)">
    <animate attributeName="width" from="0" to="260" dur="1.5s" fill="freeze" begin="1.2s" calcMode="spline" keySplines="0.16 1 0.3 1"/>
  </rect>
  <!-- Glow dot on bar -->
  <circle cx="22" cy="179" r="4" fill="#00D2FF" opacity="0" filter="url(#cardGlow)">
    <animate attributeName="cx" from="22" to="282" dur="1.5s" fill="freeze" begin="1.2s" calcMode="spline" keySplines="0.16 1 0.3 1"/>
    <animate attributeName="opacity" values="0;0.8;0.5" dur="1.5s" fill="freeze" begin="1.2s"/>
  </circle>

  <!-- Rank badge with pulse -->
  <rect x="358" y="14" width="60" height="24" rx="12" fill="#7F52FF" fill-opacity="0.15" stroke="#7F52FF" stroke-width="0.8" stroke-opacity="0.5">
    <animate attributeName="stroke-opacity" values="0.3;0.8;0.3" dur="2s" repeatCount="indefinite"/>
  </rect>
  <text x="388" y="30" font-family="'Courier New', monospace" font-size="11" font-weight="700" fill="#7F52FF" text-anchor="middle">Rank C+</text>
</svg>
